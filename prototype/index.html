<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sightline</title>
    <link rel="preconnect" href="https://rsms.me/" />
    <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="server-notice hidden" id="server-notice">
      Run the prototype with
      <code>node src/prototype-server.ts</code>
      then open
      <a href="http://localhost:4173/prototype/">localhost:4173/prototype</a>.
    </div>

    <div class="app">
      <header class="topbar">
        <button class="brand btn-quiet" id="home-link" type="button">
          <span class="brand-mark">Sightline</span>
        </button>
        <div class="topbar-actions">
          <button class="btn-quiet btn" id="new-inspection-button" type="button">+ New inspection</button>
        </div>
      </header>

      <main class="canvas">
        <!-- LIBRARY VIEW -->
        <section id="library" class="view library">
          <div class="library-header">
            <h1>Inspections</h1>
          </div>
          <div class="library-list" id="library-list" role="list"></div>
        </section>

        <!-- INSPECTION VIEW (single canvas: empty / running / reviewed) -->
        <section id="inspection" class="view dossier hidden" data-state="empty">
          <button class="inspection-back" id="inspection-back" type="button">Inspections</button>

          <div class="hero">
            <label class="hero-reference" id="hero-reference" data-state="empty">
              <input id="reference-input" name="reference" type="file" accept="image/*" />
              <img id="reference-image" alt="" hidden />
            </label>
            <div class="hero-text">
              <textarea
                id="hero-description"
                class="hero-description-input"
                rows="2"
                placeholder="What defect should Sightline find?"
              ></textarea>
              <div class="hero-meta" id="hero-meta">
                <span class="pill" id="hero-pill" data-state="draft">draft</span>
                <span id="hero-summary"></span>
              </div>
            </div>
          </div>

          <!-- COMPOSE (empty state only): targets dropzone -->
          <div id="compose" class="compose">
            <div class="compose-targets" id="compose-targets" data-active="false">
              <input id="targets-input" name="targets" type="file" accept="image/*" multiple />
              <div class="compose-targets-empty" id="compose-targets-empty">
                <strong>Add target images</strong>
                <span>Drop images here or click to choose. Up to 25.</span>
              </div>
            </div>
            <div class="compose-footer">
              <span class="helper" id="compose-helper">Reference + description + at least one target.</span>
              <button class="btn" id="start-inspection" type="button" disabled>Start inspection</button>
            </div>
          </div>

          <!-- FILTERS (review state only) -->
          <div class="filters hidden" id="filters" role="tablist"></div>

          <!-- GRID (running + review) -->
          <div class="section-label hidden" id="grid-label">Targets</div>
          <div class="grid" id="grid"></div>
        </section>
      </main>
    </div>

    <!-- DETAIL SHEET (overlay) -->
    <div class="sheet-backdrop" id="sheet-backdrop" data-open="false"></div>
    <aside class="sheet" id="sheet" data-open="false" aria-modal="true" role="dialog">
      <div class="sheet-header">
        <div class="sheet-nav">
          <button class="btn-quiet btn" id="sheet-prev" type="button">← Prev</button>
          <span class="position" id="sheet-position">1 / 1</span>
          <button class="btn-quiet btn" id="sheet-next" type="button">Next →</button>
        </div>
        <div>
          <button class="btn-quiet btn" id="sheet-close" type="button">Close <span class="kbd">Esc</span></button>
        </div>
      </div>
      <div class="sheet-body">
        <div class="sheet-image">
          <div class="sheet-image-wrap" id="sheet-image-wrap">
            <img id="sheet-image" alt="" />
            <svg class="overlay" id="sheet-overlay" aria-hidden="true"></svg>
          </div>
        </div>
        <aside class="sheet-side">
          <div class="field">
            <span class="field-label">Result</span>
            <h2 id="sheet-status">—</h2>
          </div>
          <div class="field">
            <span class="field-label">File</span>
            <span class="field-value mono" id="sheet-filename">—</span>
          </div>
          <div class="field" id="sheet-latency-field">
            <span class="field-label">Latency</span>
            <span class="field-value" id="sheet-latency">—</span>
          </div>
          <div class="field" id="sheet-detections-field" hidden>
            <span class="field-label">Detections</span>
            <ul class="detection-list" id="sheet-detections"></ul>
          </div>
          <div class="field" id="sheet-error-field" hidden>
            <span class="field-label">Reason</span>
            <span class="field-value" id="sheet-error">—</span>
          </div>
          <div class="actions">
            <button class="btn btn-outline" id="sheet-mark-correct" type="button">✓ Correct</button>
            <button class="btn btn-outline" id="sheet-mark-wrong" type="button">✕ Wrong</button>
            <button class="btn btn-outline hidden" id="sheet-retry" type="button">Retry</button>
          </div>
        </aside>
      </div>
    </aside>

    <!-- Templates -->
    <template id="library-row-template">
      <button class="library-row" type="button" role="listitem">
        <img alt="" />
        <span>
          <strong></strong>
          <span class="summary"></span>
        </span>
        <span class="pill"></span>
        <span class="timestamp"></span>
      </button>
    </template>

    <template id="tile-template">
      <button class="tile" type="button" data-state="queued">
        <div class="tile-image">
          <img alt="" />
          <svg class="overlay" aria-hidden="true"></svg>
        </div>
        <div class="tile-meta">
          <span class="tile-name"></span>
          <span class="tile-status"></span>
        </div>
      </button>
    </template>

    <script type="module" src="./prototype.js"></script>
  </body>
</html>
